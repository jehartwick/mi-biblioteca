<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Biblioteca</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d2a4a; --bg2: #163d6b; --bg3: #1e4f8a;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.13);
  --text: #ffffff; --text2: #b8d4f0; --text3: #7aafd4;
  --accent: #87CEEB; --accent2: #aaddf5;
  --green: #4caf7d; --red: #e06b5a; --blue: #6ba3c8;
  --r: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; }
a { color: var(--accent); text-decoration: none; }
.app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
.sidebar { background: var(--bg2); border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; gap: 2px; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
.main { padding: 40px 44px; max-width: 900px; }
.logo { font-family: 'Playfair Display', serif; font-size: 19px; color: var(--accent); margin-bottom: 20px; padding-bottom: 18px; border-bottom: 1px solid var(--border); padding-left: 8px; }
.logo em { font-style: italic; }
.nav-section { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); margin: 14px 0 4px 8px; font-weight: 500; }
.nav-btn { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text2); transition: all 0.15s; border: none; background: none; width: 100%; text-align: left; font-family: 'DM Sans', sans-serif; font-weight: 400; }
.nav-btn:hover { background: var(--bg3); color: var(--text); }
.nav-btn.active { background: var(--bg3); color: var(--accent); }
.nav-icon { font-size: 13px; width: 16px; text-align: center; opacity: 0.8; }
.day-btn { display: flex; align-items: center; justify-content: space-between; padding: 7px 10px; border-radius: 8px; cursor: pointer; font-size: 12px; color: var(--text3); transition: all 0.15s; border: none; background: none; width: 100%; font-family: 'DM Sans', sans-serif; }
.day-btn:hover { background: var(--bg3); color: var(--text2); }
.day-btn.active { color: var(--accent); background: var(--bg3); }
.day-pill { background: var(--bg); padding: 1px 7px; border-radius: 20px; font-size: 10px; }
.page-header { margin-bottom: 28px; }
.page-title { font-family: 'Playfair Display', serif; font-size: 30px; font-weight: 400; }
.page-title em { color: var(--accent); font-style: italic; }
.page-sub { font-size: 13px; color: var(--text2); margin-top: 5px; }
.stats { display: flex; gap: 10px; margin-bottom: 28px; }
.stat { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 18px; flex: 1; }
.stat-n { font-family: 'Playfair Display', serif; font-size: 26px; color: var(--accent); line-height: 1; }
.stat-l { font-size: 11px; color: var(--text3); margin-top: 3px; }
.add-panel { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 20px; margin-bottom: 28px; }
.add-panel h3 { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; font-weight: 500; }
.field-row { display: grid; gap: 10px; margin-bottom: 10px; }
.field-row.two { grid-template-columns: 1fr 1fr; }
.field-row.three { grid-template-columns: 1fr 1fr 1fr; }
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; color: var(--text2); letter-spacing: 0.04em; }
.field input, .field textarea, .field select { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 300; outline: none; transition: border 0.15s; resize: none; }
.field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
.field input::placeholder, .field textarea::placeholder { color: var(--text3); }
.field select option { background: var(--bg3); }
.add-actions { display: flex; gap: 8px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
.btn { border-radius: 8px; padding: 9px 18px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.15s; border: none; }
.btn-gold { background: var(--accent); color: #0d2a4a; }
.btn-gold:hover { background: var(--accent2); }
.btn-gold:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-ghost { background: none; color: var(--text2); border: 1px solid var(--border2); }
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.day-group { margin-bottom: 32px; }
.day-heading { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.day-heading h2 { font-family: 'Playfair Display', serif; font-size: 16px; font-weight: 400; color: var(--text2); white-space: nowrap; }
.day-line { flex: 1; height: 1px; background: var(--border); }
.s-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 18px; margin-bottom: 8px; display: grid; grid-template-columns: 1fr 1fr auto; gap: 16px; align-items: start; transition: border 0.15s, opacity 0.15s; }
.s-card:hover { border-color: var(--border2); }
.s-card.mastered { opacity: 0.38; }
.lang-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }
.en-text { font-size: 14px; color: var(--text2); line-height: 1.5; }
.es-text { font-size: 15px; color: var(--accent2); font-weight: 500; line-height: 1.5; }
.card-actions { display: flex; flex-direction: column; gap: 5px; align-items: center; padding-top: 2px; }
.icon-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 15px; padding: 3px 5px; border-radius: 4px; transition: color 0.15s; line-height: 1; }
.icon-btn:hover { color: var(--text); }
.icon-btn.on { color: var(--green); }
.icon-btn.del:hover { color: var(--red); }
.w-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 14px 18px; margin-bottom: 8px; display: grid; grid-template-columns: auto 1fr auto auto; gap: 14px; align-items: start; }
.w-card.used { opacity: 0.38; }
.w-es { font-size: 16px; color: var(--accent2); font-weight: 500; min-width: 140px; }
.w-en { font-size: 13px; color: var(--text2); margin-top: 3px; }
.w-note { font-size: 12px; color: var(--text3); margin-top: 4px; }
.w-actions { display: flex; gap: 4px; align-items: flex-start; padding-top: 2px; }
.used-badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; background: var(--bg3); color: var(--green); border: 1px solid rgba(76,175,125,0.3); white-space: nowrap; margin-top: 4px; }
.c-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 16px 18px; margin-bottom: 8px; }
.c-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.c-title { font-size: 15px; font-weight: 500; color: var(--text); }
.c-tag { font-size: 10px; padding: 2px 9px; border-radius: 20px; border: 1px solid var(--border2); color: var(--text3); display: inline-block; margin-top: 3px; }
.c-tag.slang { border-color: rgba(200,169,110,0.4); color: var(--accent); }
.c-tag.history { border-color: rgba(107,163,200,0.4); color: var(--blue); }
.c-body { font-size: 13px; color: var(--text2); margin-top: 8px; line-height: 1.6; }
.drill-wrap { max-width: 540px; }
.drill-top { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
.seg { display: flex; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.seg-opt { padding: 7px 14px; font-size: 12px; cursor: pointer; color: var(--text2); border: none; background: none; font-family: 'DM Sans', sans-serif; transition: all 0.15s; }
.seg-opt.active { background: var(--bg3); color: var(--accent); }
.drill-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 44px 36px; text-align: center; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; margin-bottom: 16px; }
.drill-plabel { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text3); }
.drill-prompt { font-size: 24px; line-height: 1.4; max-width: 380px; }
.drill-prompt.es { color: var(--accent2); font-weight: 500; }
.drill-answer { font-size: 14px; color: var(--text2); padding-top: 16px; border-top: 1px solid var(--border); width: 100%; display: none; }
.drill-answer.show { display: block; }
.drill-btns { display: flex; gap: 10px; justify-content: center; }
.drill-prog { font-size: 12px; color: var(--text3); text-align: center; margin-bottom: 16px; }
.drill-prog b { color: var(--accent); font-weight: 500; }
.empty { padding: 48px 0; text-align: center; color: var(--text3); font-size: 14px; }
.settings-wrap { max-width: 560px; }
.settings-section { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r); padding: 24px; margin-bottom: 16px; }
.settings-section h3 { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 6px; }
.settings-section p { font-size: 13px; color: var(--text2); margin-bottom: 16px; line-height: 1.6; }
.setup-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 40px; }
.setup-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 48px; max-width: 480px; width: 100%; text-align: center; }
.setup-logo { font-family: 'Playfair Display', serif; font-size: 36px; color: var(--accent); margin-bottom: 8px; }
.setup-logo em { font-style: italic; }
.setup-sub { font-size: 14px; color: var(--text2); margin-bottom: 32px; line-height: 1.6; }
.setup-fields { text-align: left; display: flex; flex-direction: column; gap: 14px; margin-bottom: 24px; }
.setup-note { font-size: 11px; color: var(--text3); margin-top: 16px; line-height: 1.6; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
.pulsing { animation: pulse 1s infinite; color: var(--accent); font-size: 12px; }
</style>
</head>
<body>
<div id="app-root"></div>
<script>
const SETTINGS_KEY = 'mibiblioteca_settings';
const CACHE_KEY = 'mibiblioteca_cache_v2';
let settings = (() => { try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; } catch(e) { return {}; } })();
let cache = (() => { try { return JSON.parse(localStorage.getItem(CACHE_KEY)) || {sentences:[],words:[],culture:[],lastSync:null}; } catch(e) { return {sentences:[],words:[],culture:[],lastSync:null}; } })();
let view = 'sentences', dayFilter = null;
let drillIdx = 0, drillDir = 'en-es', drillRevealed = false, drillQueue = [];
let inputDir = 'en-es'; // sentence input panel direction

// PAQUETES STATE
const PAQUETES_CACHE_KEY = 'mibiblioteca_paquetes';
let paquetesCache = (() => { try { return JSON.parse(localStorage.getItem(PAQUETES_CACHE_KEY)) || {sessions:[]}; } catch(e) { return {sessions:[]}; } })();
let paquetesView = 'preview'; // 'preview' or 'package'
let paquetesSessionFilter = null; // date key of selected saved session
let todayParams = null; // current day's generated parameters
let todayPackage = null; // current day's generated package content
function savePaquetesCache() { localStorage.setItem(PAQUETES_CACHE_KEY, JSON.stringify(paquetesCache)); }

function saveSettings() { localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); }
function saveCache() { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); }
function isConfigured() { return !!(settings.token && settings.dbId); }

// NOTION API
const PROXY = 'https://notion-proxy.jehartwick.workers.dev';
async function notionReq(path, method='GET', body=null) {
  const opts = { method, headers: { 'Authorization': 'Bearer ' + settings.token, 'Notion-Version': '2022-06-28', 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(PROXY + path, opts);
  if (!res.ok) { const e = await res.json(); throw new Error(e.message || 'Notion API error'); }
  return res.json();
}

async function notionQuery() {
  const data = await notionReq('/databases/' + settings.dbId + '/query', 'POST', { page_size: 100 });
  return data.results || [];
}

function getProp(page, name, type) {
  const p = page.properties[name];
  if (!p) return type === 'checkbox' ? false : '';
  if (type === 'title') return (p.title || []).map(t => t.plain_text).join('');
  if (type === 'rich_text') return (p.rich_text || []).map(t => t.plain_text).join('');
  if (type === 'checkbox') return !!p.checkbox;
  if (type === 'select') return p.select ? p.select.name : '';
  return '';
}

function makeProps(obj) {
  const p = {};
  if (obj.english !== undefined) p['english'] = { title: [{ text: { content: String(obj.english) } }] };
  if (obj.spanish !== undefined) p['spanish'] = { rich_text: [{ text: { content: String(obj.spanish || '') } }] };
  if (obj.notes !== undefined) p['notes'] = { rich_text: [{ text: { content: String(obj.notes || '') } }] };
  if (obj.section !== undefined) p['section'] = { select: { name: obj.section } };
  if (obj.tag !== undefined) p['tag'] = { select: { name: obj.tag } };
  if (obj.mastered !== undefined) p['mastered'] = { checkbox: !!obj.mastered };
  if (obj.used !== undefined) p['used'] = { checkbox: !!obj.used };
  if (obj.day_key !== undefined) p['day_key'] = { rich_text: [{ text: { content: String(obj.day_key || '') } }] };
  if (obj.day_label !== undefined) p['day_label'] = { rich_text: [{ text: { content: String(obj.day_label || '') } }] };
  return p;
}

function pageToItem(page) {
  return {
    id: page.id,
    english: getProp(page, 'english', 'title'),
    spanish: getProp(page, 'spanish', 'rich_text'),
    notes: getProp(page, 'notes', 'rich_text'),
    section: getProp(page, 'section', 'select'),
    tag: getProp(page, 'tag', 'select'),
    mastered: getProp(page, 'mastered', 'checkbox'),
    used: getProp(page, 'used', 'checkbox'),
    day_key: getProp(page, 'day_key', 'rich_text'),
    day_label: getProp(page, 'day_label', 'rich_text'),
  };
}

async function createPage(obj) {
  return notionReq('/pages', 'POST', { parent: { database_id: settings.dbId }, properties: makeProps(obj) });
}
async function updatePage(id, obj) { return notionReq('/pages/' + id, 'PATCH', { properties: makeProps(obj) }); }
async function archivePage(id) { return notionReq('/pages/' + id, 'PATCH', { archived: true }); }

async function syncFromNotion() {
  const pages = await notionQuery();
  const items = pages.map(pageToItem);
  cache.sentences = items.filter(i => i.section === 'sentence');
  cache.words = items.filter(i => i.section === 'word');
  cache.culture = items.filter(i => i.section === 'culture');
  cache.lastSync = Date.now();
  saveCache();
}

async function syncPaquetesFromNotion() {
  if (!settings.paquetesDbId) return;
  const data = await notionReq('/databases/' + settings.paquetesDbId + '/query', 'POST', { page_size: 100 });
  const pages = data.results || [];
  paquetesCache.sessions = pages.map(page => ({
    date: getProp(page, 'date', 'rich_text'),
    verb: getProp(page, 'verb', 'title'),
    infinitive_english: getProp(page, 'infinitive_english', 'rich_text'),
    vocabulary: getProp(page, 'vocabulary', 'rich_text'),
    grammar_concept: getProp(page, 'grammar_concept', 'rich_text'),
    pronoun_focus: getProp(page, 'pronoun_focus', 'rich_text'),
    mexican_expression: getProp(page, 'mexican_expression', 'rich_text'),
    package_content: getProp(page, 'package_content', 'rich_text'),
    status: getProp(page, 'status', 'select'),
    notes: getProp(page, 'notes', 'rich_text'),
  })).filter(s => s.date && s.verb); // skip any malformed rows
  savePaquetesCache();
}

// INIT
function init() {
  if (!isConfigured()) renderSetup();
  else { renderApp(); loadData(); }
}

async function loadData() {
  setSyncStatus('Syncing...');
  try {
    await syncFromNotion();
    await syncPaquetesFromNotion();
    setSyncStatus(''); render();
  }
  catch(e) { setSyncStatus('Sync error'); }
}

function setSyncStatus(msg) {
  const el = document.getElementById('sync-status');
  if (el) el.innerHTML = msg ? `<span class="pulsing">${msg}</span>` : '';
}

// SETUP
function renderSetup() {
  document.getElementById('app-root').innerHTML = `
    <div class="setup-screen">
      <div class="setup-card">
        <div class="setup-logo"><em>Mi</em> Biblioteca</div>
        <p class="setup-sub">Your personal Mexico City Spanish learning library.<br>Connect your Notion database to get started.</p>
        <div class="setup-fields">
          <div class="field"><label>Notion API Token</label><input type="password" id="setup-token" placeholder="secret_..."></div>
          <div class="field"><label>Database ID</label><input id="setup-dbid" placeholder="32 character ID from your Notion URL"></div>
        </div>
        <button class="btn btn-gold" style="width:100%;padding:12px" onclick="connectNotion()">Connect to Notion</button>
        <div id="setup-status" style="margin-top:14px;font-size:13px;min-height:20px;text-align:center"></div>
        <p class="setup-note">Your credentials are stored only in your browser and sent directly to Notion — never anywhere else.</p>
      </div>
    </div>`;
}

async function connectNotion() {
  const token = document.getElementById('setup-token').value.trim();
  const dbId = document.getElementById('setup-dbid').value.trim();
  if (!token || !dbId) { document.getElementById('setup-status').innerHTML = '<span style="color:var(--red)">Both fields required</span>'; return; }
  settings.token = token; settings.dbId = dbId; saveSettings();
  document.getElementById('setup-status').innerHTML = '<span class="pulsing">Connecting to Notion...</span>';
  try { await syncFromNotion(); renderApp(); render(); }
  catch(e) { document.getElementById('setup-status').innerHTML = `<span style="color:var(--red)">Error: ${e.message}</span>`; }
}

// APP SHELL
function renderApp() {
  document.getElementById('app-root').innerHTML = `
    <div class="app">
      <aside class="sidebar">
        <div class="logo"><em>Mi</em> Biblioteca</div>
        <div style="padding-left:8px;min-height:18px" id="sync-status"></div>
        <div class="nav-section">Practice</div>
        <button class="nav-btn" onclick="nav('paquetes')" id="nb-paquetes"><span class="nav-icon">🦋</span> Paquetes</button>
        <div id="paquetes-session-nav"></div>
        <div class="nav-section" style="margin-top:10px">Vocabulary</div>
        <button class="nav-btn" onclick="nav('words')" id="nb-words"><span class="nav-icon">✏️</span> Words & Phrases</button>
        <div class="nav-section" style="margin-top:10px">Mexico City</div>
        <button class="nav-btn" onclick="nav('culture')" id="nb-culture"><span class="nav-icon">🌮</span> Culture & Slang</button>
        <div class="nav-section" style="margin-top:10px">Sentences</div>
        <button class="nav-btn active" onclick="nav('sentences')" id="nb-sentences"><span class="nav-icon">📖</span> All Sentences</button>
        <button class="nav-btn" onclick="nav('drill')" id="nb-drill"><span class="nav-icon">🎯</span> Drill</button>
        <div id="day-nav"></div>
        <div style="flex:1"></div>
        <button class="nav-btn" onclick="nav('settings')" id="nb-settings" style="margin-top:8px"><span class="nav-icon">⚙️</span> Settings</button>
      </aside>
      <main class="main" id="main"></main>
    </div>`;
}

function nav(v, dFilter) {
  view = v;
  if (dFilter !== undefined) dayFilter = dFilter;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nb-' + v);
  if (nb) nb.classList.add('active');
  render();
}

function render() {
  renderSidebar();
  if (view === 'sentences') renderSentences();
  else if (view === 'drill') renderDrill();
  else if (view === 'words') renderWords();
  else if (view === 'culture') renderCulture();
  else if (view === 'settings') renderSettingsView();
  else if (view === 'paquetes') renderPaquetes();
}

function renderSidebar() {
  const days = {};
  cache.sentences.forEach(s => { if (!days[s.day_key]) days[s.day_key] = { lbl: s.day_label, n: 0 }; days[s.day_key].n++; });
  const sorted = Object.entries(days).sort((a, b) => b[0].localeCompare(a[0]));
  const el = document.getElementById('day-nav');
  if (el) el.innerHTML = sorted.map(([k, v]) =>
    `<button class="day-btn ${dayFilter === k && view === 'sentences' ? 'active' : ''}" onclick="nav('sentences','${k}')">
      <span>${fmtDay(k)}</span><span class="day-pill">${v.n}</span>
    </button>`).join('');

  // Paquetes session nav
  const pEl = document.getElementById('paquetes-session-nav');
  if (pEl) {
    const sessions = [...paquetesCache.sessions].sort((a,b) => b.date.localeCompare(a.date)).slice(0,10);
    pEl.innerHTML = sessions.map(s =>
      `<button class="day-btn ${paquetesSessionFilter === s.date && view === 'paquetes' ? 'active' : ''}" onclick="navPaquetesSession('${s.date}')">
        <span>${fmtDay(s.date)} — ${esc(s.verb)}</span><span class="day-pill">✓</span>
      </button>`).join('');
  }
}

// SENTENCES
function renderSentences() {
  const all = cache.sentences;
  const filtered = dayFilter ? all.filter(s => s.day_key === dayFilter) : all;
  const mastered = all.filter(s => s.mastered).length;
  const byDay = {};
  filtered.forEach(s => { if (!byDay[s.day_key]) byDay[s.day_key] = { lbl: s.day_label, items: [] }; byDay[s.day_key].items.push(s); });
  const dayKeys = Object.keys(byDay).sort((a, b) => b.localeCompare(a));
  document.getElementById('main').innerHTML = `
    <div class="page-header">
      <h1 class="page-title">${dayFilter ? '<em>' + fmtDay(dayFilter) + '</em>' : 'All <em>Sentences</em>'}</h1>
      <p class="page-sub">${dayFilter ? `<a href="#" onclick="nav('sentences',null);return false">← All days</a>` : 'Your Mexico City Spanish sentence library'}</p>
    </div>
    <div class="stats">
      <div class="stat"><div class="stat-n">${all.length}</div><div class="stat-l">Total</div></div>

function setInputDir(dir) {
  inputDir = dir;
  const enField = document.getElementById('s-en');
  const esField = document.getElementById('s-es');
  const enLabel = document.querySelector('label[for-field="s-en"]');
  if (dir === 'en-es') {
    if (enField) { enField.placeholder = 'e.g. Today is an awesome day.'; }
    if (esField) { esField.placeholder = 'Paste or auto-translate →'; }
  } else {
    if (enField) { enField.placeholder = 'Auto-translate will fill this →'; }
    if (esField) { esField.placeholder = 'e.g. Hoy es un día increíble.'; }
  }
  // Re-render just the panel header to update active state on buttons
  renderSentences();
}

async function addSentence() {
  const en = document.getElementById('s-en').value.trim();
  const es = document.getElementById('s-es').value.trim();
  if (!en || !es) { setStatus('s-status', 'Enter both fields', 'var(--red)'); return; }
  const btn = document.getElementById('save-s-btn');
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const page = await createPage({ english: en, spanish: es, section: 'sentence', mastered: false, day_key: todayKey(), day_label: todayLabel() });
    cache.sentences.unshift(pageToItem(page));
    saveCache(); dayFilter = null; render(); showToast('Saved!');
  } catch(e) { setStatus('s-status', 'Error: ' + e.message, 'var(--red)'); }
  btn.disabled = false; btn.textContent = 'Save sentence';
}

async function autoTranslate() {
  const isEnToEs = inputDir === 'en-es';
  const sourceField = document.getElementById(isEnToEs ? 's-en' : 's-es');
  const targetField = document.getElementById(isEnToEs ? 's-es' : 's-en');
  const sourceText = sourceField ? sourceField.value.trim() : '';
  if (!sourceText) { setStatus('s-status', isEnToEs ? 'Enter English first' : 'Enter Spanish first', 'var(--red)'); return; }
  const btn = document.getElementById('translate-btn');
  btn.disabled = true; setStatus('s-status', 'Translating...', 'var(--accent)');
  const prompt = isEnToEs
    ? `Translate this to natural Mexico City Spanish as spoken by an educated, upper-middle-class Chilango — articulate and fluid, the kind of Spanish you'd hear in a dinner conversation in Condesa or Polanco. Not stiff or formal, not street slang, but cultured and natural. Return ONLY the Spanish translation, nothing else.\n\n"${sourceText}"`
    : `Translate this Mexico City Spanish to natural English. Return ONLY the English translation, nothing else.\n\n"${sourceText}"`;
  try {
    const res = await fetch(PROXY + '/anthropic/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': settings.anthropicKey || '', 'anthropic-version': '2023-06-01' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 200, messages: [{ role: 'user', content: prompt }] })
    });
    const data = await res.json();
    const t = data.content?.find(c => c.type === 'text')?.text?.trim() || '';
    if (t) { if (targetField) targetField.value = t; setStatus('s-status', '✓ Done', 'var(--green)'); }
    else setStatus('s-status', 'Error: ' + (data.error?.message || 'no content'), 'var(--red)');
  } catch(e) { setStatus('s-status', 'Error: ' + e.message, 'var(--red)'); }
  btn.disabled = false;
}

async function toggleMastered(id, current) {
  const item = cache.sentences.find(s => s.id === id);
  if (!item) return;
  item.mastered = !current; saveCache(); render();
  try { await updatePage(id, { mastered: item.mastered }); } catch(e) { item.mastered = current; saveCache(); render(); }
}

async function deleteItem(id, section) {
  if (!confirm('Delete this entry?')) return;
  const arr = section === 'sentence' ? cache.sentences : section === 'word' ? cache.words : cache.culture;
  const idx = arr.findIndex(x => x.id === id);
  if (idx >= 0) { arr.splice(idx, 1); saveCache(); render(); }
  try { await archivePage(id); } catch(e) {}
}

// DRILL
let drillSetup = true;
let drillSelectedDays = [];
let drillSource = 'sentences'; // 'sentences' or 'paquetes'
let drillSelectedSessions = []; // paquetes session dates
let drillLayerFilter = 'all'; // 'all' | 'Base conjugations' | 'Object pronouns' | 'Grammar concept' | 'Mexican layer'

function renderDrill() {
  if (drillSetup) { renderDrillSetup(); return; }
  renderDrillCards();
}

function renderDrillSetup() {
  const hasSessions = paquetesCache.sessions.length > 0;

  // Sentences days
  const days = {};
  cache.sentences.filter(s => !s.mastered).forEach(s => {
    if (!days[s.day_key]) days[s.day_key] = { lbl: s.day_label, n: 0 };
    days[s.day_key].n++;
  });
  const sortedDays = Object.entries(days).sort((a, b) => b[0].localeCompare(a[0]));

  // Paquetes sessions
  const sortedSessions = [...paquetesCache.sessions].sort((a, b) => b.date.localeCompare(a.date));

  const poolCount = getDrillPool().length;

  document.getElementById('main').innerHTML = `
    <div class="page-header">
      <h1 class="page-title">Drill <em>Mode</em></h1>
      <p class="page-sub">Choose your source, select days, then start.</p>
    </div>

    <div style="margin-bottom:16px;">
      <div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;font-weight:500;">Source</div>
      <div class="seg" style="width:fit-content;">
        <button class="seg-opt ${drillSource === 'sentences' ? 'active' : ''}" onclick="setDrillSource('sentences')">📖 Sentences</button>
        <button class="seg-opt ${drillSource === 'paquetes' ? 'active' : ''}" onclick="setDrillSource('paquetes')">🦋 Paquetes</button>
      </div>
    </div>

    ${drillSource === 'sentences' ? `
    <div class="add-panel">
      <h3>Select days</h3>
      <p style="font-size:12px;color:var(--text3);margin-bottom:14px;">Leave all unchecked to drill everything in rotation.</p>
      ${sortedDays.length === 0 ? `<div style="color:var(--text3);font-size:13px;">No sentences in rotation yet.</div>` : ''}
      ${sortedDays.map(([k, v]) => `
        <label style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;">
          <input type="checkbox" value="${k}" ${drillSelectedDays.includes(k) ? 'checked' : ''}
            onchange="toggleDrillDay('${k}')"
            style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer;">
          <span style="font-size:13px;color:var(--text2);flex:1;">${fmtDay(k)}</span>
          <span style="font-size:11px;color:var(--text3);">${v.n} sentence${v.n !== 1 ? 's' : ''}</span>
        </label>`).join('')}
    </div>` : `
    <div class="add-panel">
      <h3>Select sessions</h3>
      <p style="font-size:12px;color:var(--text3);margin-bottom:14px;">Leave all unchecked to drill all saved sessions.</p>
      ${sortedSessions.length === 0 ? `<div style="color:var(--text3);font-size:13px;">No saved Paquetes sessions yet.</div>` : ''}
      ${sortedSessions.map(s => `
        <label style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;">
          <input type="checkbox" value="${s.date}" ${drillSelectedSessions.includes(s.date) ? 'checked' : ''}
            onchange="toggleDrillSession('${s.date}')"
            style="width:16px;height:16px;accent-color:var(--accent);cursor:pointer;">
          <span style="font-size:13px;color:var(--text2);flex:1;">${fmtDay(s.date)} — <em>${esc(s.verb)}</em></span>
          <span style="font-size:11px;color:var(--text3);">${esc(s.grammar_concept)}</span>
        </label>`).join('')}
    </div>

    <div style="margin-bottom:16px;">
      <div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;font-weight:500;">Layer filter</div>
      <div class="seg" style="width:fit-content;flex-wrap:wrap;">
        ${['all','Base conjugations','Object pronouns','Grammar concept','Mexican layer'].map(l => `
          <button class="seg-opt ${drillLayerFilter === l ? 'active' : ''}" onclick="setDrillLayer('${l}')">${l === 'all' ? 'All layers' : l}</button>`).join('')}
      </div>
    </div>`}

    <div style="margin-bottom:16px;">
      <div style="font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:10px;font-weight:500;">Direction</div>
      <div class="seg" style="width:fit-content;">
        <button class="seg-opt ${drillDir === 'en-es' ? 'active' : ''}" onclick="setDir('en-es')">English → Spanish</button>
        <button class="seg-opt ${drillDir === 'es-en' ? 'active' : ''}" onclick="setDir('es-en')">Spanish → English</button>
      </div>
    </div>

    <div style="display:flex;gap:8px;align-items:center;">
      <button class="btn btn-gold" onclick="startDrill()" ${poolCount === 0 ? 'disabled' : ''}>Start drilling</button>
      ${(drillSelectedDays.length > 0 || drillSelectedSessions.length > 0) ? `
        <button class="btn btn-ghost btn-sm" onclick="drillSelectedDays=[];drillSelectedSessions=[];renderDrillSetup()">Clear selection</button>` : ''}
      <span style="font-size:12px;color:var(--text3);">${poolCount} sentence${poolCount !== 1 ? 's' : ''} in pool</span>
    </div>`;
}

function setDrillSource(src) {
  drillSource = src;
  drillSelectedDays = [];
  drillSelectedSessions = [];
  drillLayerFilter = 'all';
  renderDrillSetup();
}

function toggleDrillDay(dayKey) {
  const idx = drillSelectedDays.indexOf(dayKey);
  if (idx >= 0) drillSelectedDays.splice(idx, 1);
  else drillSelectedDays.push(dayKey);
  renderDrillSetup();
}

function toggleDrillSession(dateKey) {
  const idx = drillSelectedSessions.indexOf(dateKey);
  if (idx >= 0) drillSelectedSessions.splice(idx, 1);
  else drillSelectedSessions.push(dateKey);
  renderDrillSetup();
}

function setDrillLayer(layer) {
  drillLayerFilter = layer;
  renderDrillSetup();
}

function getDrillPool() {
  if (drillSource === 'sentences') {
    const active = cache.sentences.filter(s => !s.mastered);
    if (drillSelectedDays.length === 0) return active;
    return active.filter(s => drillSelectedDays.includes(s.day_key));
  }
  // Paquetes source — extract sentences from saved sessions
  let sessions = paquetesCache.sessions;
  if (drillSelectedSessions.length > 0) {
    sessions = sessions.filter(s => drillSelectedSessions.includes(s.date));
  }
  const sentences = [];
  for (const session of sessions) {
    const tenses = parseSavedContent(session.package_content || '');
    for (const tense of tenses) {
      for (const layer of tense.layers) {
        if (drillLayerFilter !== 'all' && layer.label !== drillLayerFilter) continue;
        for (const s of layer.sentences) {
          sentences.push({
            id: `paq-${session.date}-${tense.technical}-${layer.label}-${sentences.length}`,
            english: s.en,
            spanish: s.es,
            source: `${esc(session.verb)} · ${tense.technical} · ${layer.label}`,
            mastered: false
          });
        }
      }
    }
  }
  return sentences;
}

function startDrill() {
  const pool = getDrillPool();
  if (pool.length === 0) return;
  drillQueue = [...pool].sort(() => Math.random() - 0.5);
  drillIdx = 0;
  drillRevealed = false;
  drillSetup = false;
  renderDrillCards();
}

function renderDrillCards() {
  const current = drillQueue[drillIdx];
  const isPaquetes = drillSource === 'paquetes';
  const labelParts = [];
  if (drillSource === 'paquetes') {
    labelParts.push('🦋 Paquetes');
    if (drillLayerFilter !== 'all') labelParts.push(drillLayerFilter);
  } else {
    labelParts.push(drillSelectedDays.length > 0 ? `${drillSelectedDays.length} day${drillSelectedDays.length !== 1 ? 's' : ''}` : 'All days');
  }
  const label = labelParts.join(' · ');

  document.getElementById('main').innerHTML = `
    <div class="page-header">
      <h1 class="page-title">Drill <em>Mode</em></h1>
      <p class="page-sub"><a href="#" onclick="drillSetup=true;renderDrill();return false;">← Change setup</a> · ${label}</p>
    </div>
    <div class="drill-wrap">
      <div class="drill-top">
        <div class="seg">
          <button class="seg-opt ${drillDir === 'en-es' ? 'active' : ''}" onclick="setDir('en-es')">English → Spanish</button>
          <button class="seg-opt ${drillDir === 'es-en' ? 'active' : ''}" onclick="setDir('es-en')">Spanish → English</button>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="reshuffleDrill()">Reshuffle</button>
      </div>
      ${!current ? `<div class="empty">All done! <a href="#" onclick="reshuffleDrill();return false">Start again</a> · <a href="#" onclick="drillSetup=true;renderDrill();return false;">Change setup</a></div>` : `
      <div class="drill-prog">Card <b>${drillIdx + 1}</b> of <b>${drillQueue.length}</b></div>
      <div class="drill-card">
        ${isPaquetes && current.source ? `<div style="font-size:10px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text3);margin-bottom:6px;">${current.source}</div>` : ''}
        <div class="drill-plabel">${drillDir === 'en-es' ? 'Say this in Spanish' : 'Say this in English'}</div>
        <div class="drill-prompt ${drillDir === 'es-en' ? 'es' : ''}">${esc(drillDir === 'en-es' ? current.english : current.spanish)}</div>
        <div class="drill-answer ${drillRevealed ? 'show' : ''}">${esc(drillDir === 'en-es' ? current.spanish : current.english)}</div>
      </div>
      <div class="drill-btns">
        ${!drillRevealed
          ? `<button class="btn btn-ghost" onclick="revealDrill()">Show answer</button>`
          : `${!isPaquetes ? `<button class="btn btn-ghost" onclick="drillMastered('${current.id}')">✓ Mastered</button>` : ''}
             <button class="btn btn-gold" onclick="nextDrill()">Next →</button>`}
      </div>`}
    </div>`;
}

function setDir(d) { drillDir = d; drillRevealed = false; renderDrill(); }
function revealDrill() { drillRevealed = true; renderDrillCards(); }
function nextDrill() { drillIdx++; drillRevealed = false; renderDrillCards(); }
function reshuffleDrill() {
  drillQueue = [...getDrillPool()].sort(() => Math.random() - 0.5);
  drillIdx = 0; drillRevealed = false; renderDrillCards();
}
async function drillMastered(id) {
  const s = cache.sentences.find(x => x.id === id);
  if (s) { s.mastered = true; saveCache(); }
  drillQueue = drillQueue.filter(x => x.id !== id);
  drillIdx = Math.min(drillIdx, drillQueue.length - 1);
  drillRevealed = false; renderDrillCards();
  try { await updatePage(id, { mastered: true }); } catch(e) {}
}

// DICTATION
let recognition = null, dictating = false;
function toggleDictation() {
  const btn = document.getElementById('mic-btn');
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) { setStatus('s-status', 'Not supported in this browser', 'var(--red)'); return; }
  if (dictating) { recognition && recognition.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'en-US'; recognition.continuous = false; recognition.interimResults = true;
  recognition.onstart = () => { dictating = true; if (btn) { btn.textContent = '⏹ Stop'; btn.style.color = 'var(--red)'; btn.style.borderColor = 'var(--red)'; } setStatus('s-status', 'Listening...', 'var(--accent)'); };
  recognition.onresult = (e) => { const t = Array.from(e.results).map(r => r[0].transcript).join(''); const f = document.getElementById('s-en'); if (f) f.value = t; };
  recognition.onend = () => { dictating = false; if (btn) { btn.textContent = '🎙 Dictate'; btn.style.color = ''; btn.style.borderColor = ''; } setStatus('s-status', '', ''); };
  recognition.onerror = () => { dictating = false; if (btn) { btn.textContent = '🎙 Dictate'; btn.style.color = ''; btn.style.borderColor = ''; } setStatus('s-status', 'Mic error', 'var(--red)'); };
  recognition.start();
}

// SPEAK
async function speak(text) {
  if (settings.elevenKey && settings.voiceId) {
    try {
      const res = await fetch('https://api.elevenlabs.io/v1/text-to-speech/' + settings.voiceId, {
        method: 'POST',
        headers: { 'xi-api-key': settings.elevenKey, 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, model_id: 'eleven_multilingual_v2', voice_settings: { stability: 0.5, similarity_boost: 0.75 } })
      });
      if (res.ok) {
        const blob = await res.blob();
        const audio = new Audio(URL.createObjectURL(blob));
        audio.play();
        return;
      }
    } catch(e) { console.log('ElevenLabs error, falling back to browser TTS', e); }
  }
  // Fallback to browser TTS
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-MX'; u.rate = 0.9;
  const voices = speechSynthesis.getVoices();
  const mx = voices.find(v => v.lang === 'es-MX') || voices.find(v => v.lang.startsWith('es'));
  if (mx) u.voice = mx;
  speechSynthesis.speak(u);
}
if (window.speechSynthesis) speechSynthesis.onvoiceschanged = () => {};

// UTILS
function todayKey() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function todayLabel() { return new Date().toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' }); }
function fmtDay(key) { try { const [y,m,d] = key.split('-').map(Number); return new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); } catch(e) { return key; } }
function setStatus(id, msg, color) { const el = document.getElementById(id); if (el) { el.textContent = msg; el.style.color = color; el.style.fontSize = '12px'; } }
function esc(s='') { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
let toastTimer;
function showToast(msg, type='success') {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; t.style.cssText = 'position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:8px;font-size:13px;z-index:9999;transition:opacity 0.3s;color:#fff'; document.body.appendChild(t); }
  t.textContent = msg; t.style.background = type === 'error' ? 'var(--red)' : 'var(--green)'; t.style.opacity = '1';
  clearTimeout(toastTimer); toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 2000);
}

// ── PARAMETER ROTATION ────────────────────────────────────────────────────────

function pickRandom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function pickExcluding(arr, excludeLabel) {
  const filtered = arr.filter(item => (item.es || item.label || item) !== excludeLabel);
  return pickRandom(filtered.length ? filtered : arr);
}

function generateParams(swapField = null) {
  const existing = todayParams || {};
  const isReflexiveDay = Math.random() < 0.25; // 25% chance of reflexive verb
  const verbPool = isReflexiveDay ? REFLEXIVE_VERB_POOL : VERB_POOL;

  return {
    verb: swapField === 'verb' || !existing.verb
      ? pickExcluding(verbPool, existing.verb?.es)
      : existing.verb,
    vocabulary: swapField === 'vocabulary' || !existing.vocabulary
      ? pickRandom(VOCAB_POOL)
      : existing.vocabulary,
    grammar: swapField === 'grammar' || !existing.grammar
      ? pickExcluding(GRAMMAR_POOL, existing.grammar?.label)
      : existing.grammar,
    pronoun: swapField === 'pronoun' || !existing.pronoun
      ? pickExcluding(PRONOUN_POOL, existing.pronoun)
      : existing.pronoun,
    mexican: swapField === 'mexican' || !existing.mexican
      ? pickExcluding(MEXICAN_POOL, existing.mexican?.label)
      : existing.mexican,
    date: todayKey()
  };
}

function initTodayParams() {
  // If we already have params for today, restore them
  const stored = localStorage.getItem('paquetes_today_params');
  if (stored) {
    try {
      const p = JSON.parse(stored);
      if (p.date === todayKey()) { todayParams = p; return; }
    } catch(e) {}
  }
  // Otherwise generate fresh
  todayParams = generateParams();
  saveTodayParams();
}

function saveTodayParams() {
  localStorage.setItem('paquetes_today_params', JSON.stringify(todayParams));
}

function swapParam(field) {
  todayParams = generateParams(field);
  saveTodayParams();
  renderPaquetes();
}

function regenerateAll() {
  todayParams = null; // clear so generateParams starts fresh
  todayParams = generateParams();
  saveTodayParams();
  todayPackage = null;
  renderPaquetes();
}

  const divider = layerIdx > 0 ? `<div style="height:1px;background:var(--border);margin:10px 0;"></div>` : '';

    const enId = `en-${tenseIdx}-${layerIdx}-${si}`;
    const enBtnId = `en-btn-${tenseIdx}-${layerIdx}-${si}`;
    const esEscaped = esc(s.es).replace(/'/g, '&#39;');
    const enEscaped = esc(s.en).replace(/'/g, '&#39;');
    const saveStyle = `font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;color:#0d2a4a;background:var(--accent2);border:none;border-radius:6px;padding:3px 9px;cursor:pointer;white-space:nowrap;`;
    const enBtnStyle = `font-family:'DM Sans',sans-serif;font-size:11px;font-weight:400;color:var(--text3);background:transparent;border:1px solid var(--border2);border-radius:6px;padding:3px 8px;cursor:pointer;`;
    return `
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;padding:4px 0;">
        <div style="flex:1;">
          <div style="font-size:14px;color:var(--accent2);line-height:1.6;">${esc(s.es)}</div>
          <div id="${enId}" style="font-size:13px;color:var(--text);margin-top:3px;display:none;">${esc(s.en)}</div>
        </div>
        <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0;margin-top:3px;">
          <button id="${enBtnId}" style="${enBtnStyle}" onclick="toggleEnglish('${enId}','${enBtnId}')">EN</button>
          <button style="${saveStyle}" onclick="savePackageSentence('${esEscaped}','${enEscaped}',this)">+ save</button>
        </div>
      </div>`;
  }).join('');
  return `
    ${divider}
    <div style="font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3);margin-bottom:8px;font-weight:500;">${esc(layer.label)}</div>
    ${sentences}`;
}

function toggleTenseCard(idx) {
  const body = document.getElementById(`tense-body-${idx}`);
  const chevron = document.getElementById(`chevron-${idx}`);
  if (!body || !chevron) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  chevron.textContent = open ? '▶' : '▼';
}

function toggleEnglish(enId, btnId) {
  const el = document.getElementById(enId);
  const btn = document.getElementById(btnId);
  if (!el || !btn) return;
  const showing = el.style.display !== 'none';
  el.style.display = showing ? 'none' : 'block';
  btn.style.color = showing ? 'var(--text3)' : 'var(--accent2)';
  btn.style.borderColor = showing ? 'var(--border2)' : 'rgba(170,221,245,0.4)';
}

async function savePackageSentence(es, en, btn) {
  if (!es || !en) return;
  const orig = btn.textContent;
  btn.disabled = true; btn.textContent = '...';
  try {
    const page = await createPage({ english: en, spanish: es, section: 'sentence', mastered: false, day_key: todayKey(), day_label: todayLabel() });
    cache.sentences.unshift(pageToItem(page));
    saveCache();
    btn.textContent = '✓'; btn.style.background = 'var(--green)'; btn.style.color = '#fff';
    showToast('Saved to library!');
  } catch(e) {
    btn.disabled = false; btn.textContent = orig;
    showToast('Error saving', 'error');
  }
}

async function saveSession() {
  if (!todayPackage || !settings.paquetesDbId) {
    setStatus('save-session-status', settings.paquetesDbId ? 'No package to save' : '⚠ Add Paquetes DB ID in Settings', 'var(--red)');
    return;
  }
  const p = todayParams;
  const content = todayPackage.map(t =>
    `${t.technical} | ${t.human}\n` +
    t.layers.map(l => `  [${l.label}]\n` + l.sentences.map(s => `  ${s.es} | ${s.en}`).join('\n')).join('\n')
  ).join('\n\n');
  setStatus('save-session-status', 'Saving...', 'var(--accent)');
  try {
    const props = {
      verb: p.verb.es, infinitive_english: p.verb.en,
      vocabulary: p.vocabulary.join(', '), grammar_concept: p.grammar.label,
      pronoun_focus: p.pronoun, mexican_expression: p.mexican.label,
      package_content: content, date: todayKey(), status: 'Done', notes: ''
    };
    await notionReq('/pages', 'POST', {
      parent: { database_id: settings.paquetesDbId },
      properties: makePaquetesProps(props)
    });
    const existing = paquetesCache.sessions.findIndex(s => s.date === todayKey());
    if (existing >= 0) paquetesCache.sessions[existing] = props;
    else paquetesCache.sessions.unshift(props);
    savePaquetesCache();
    renderSidebar();
    setStatus('save-session-status', '✓ Session saved', 'var(--green)');
    showToast('Session saved!');
  } catch(e) {
    setStatus('save-session-status', 'Error: ' + e.message, 'var(--red)');
  }
}

function makePaquetesProps(obj) {
  const p = {};
  if (obj.verb !== undefined) p['verb'] = { title: [{ text: { content: String(obj.verb) } }] };
  if (obj.infinitive_english !== undefined) p['infinitive_english'] = { rich_text: [{ text: { content: String(obj.infinitive_english) } }] };
  if (obj.vocabulary !== undefined) p['vocabulary'] = { rich_text: [{ text: { content: String(obj.vocabulary) } }] };
  if (obj.grammar_concept !== undefined) p['grammar_concept'] = { rich_text: [{ text: { content: String(obj.grammar_concept) } }] };
  if (obj.pronoun_focus !== undefined) p['pronoun_focus'] = { rich_text: [{ text: { content: String(obj.pronoun_focus) } }] };
  if (obj.mexican_expression !== undefined) p['mexican_expression'] = { rich_text: [{ text: { content: String(obj.mexican_expression) } }] };
  if (obj.package_content !== undefined) p['package_content'] = { rich_text: [{ text: { content: String(obj.package_content).slice(0, 2000) } }] };
  if (obj.date !== undefined) p['date'] = { rich_text: [{ text: { content: String(obj.date) } }] };
  if (obj.status !== undefined) p['status'] = { select: { name: obj.status } };
  if (obj.notes !== undefined) p['notes'] = { rich_text: [{ text: { content: String(obj.notes) } }] };
  return p;
}

function renderSavedSession(session) {
  const tenses = parseSavedContent(session.package_content || '');
  const hasTenses = tenses.length > 0;
  document.getElementById('main').innerHTML = `
    <div class="page-header">
      <h1 class="page-title"><em>${esc(session.verb)}</em></h1>
      <p class="page-sub"><a href="#" onclick="paquetesSessionFilter=null;paquetesView='preview';renderPaquetes();return false;">← Today's package</a> · ${fmtDay(session.date)}</p>
    </div>
    <div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:16px;display:flex;gap:24px;flex-wrap:wrap;">
      <span style="font-size:12px;color:var(--text3);">Grammar: <span style="color:var(--text2);">${esc(session.grammar_concept)}</span></span>
      <span style="font-size:12px;color:var(--text3);">Pronouns: <span style="color:var(--text2);">${esc(session.pronoun_focus)}</span></span>
      <span style="font-size:12px;color:var(--text3);">Mexican: <span style="color:var(--text2);">${esc(session.mexican_expression)}</span></span>
      <span style="font-size:12px;color:var(--text3);">Vocab: <span style="color:var(--text2);">${esc(session.vocabulary)}</span></span>
    </div>
    ${hasTenses
      ? tenses.map((tense, ti) => renderTenseCard(tense, 's' + ti, ti === 0)).join('')
      : `<div style="font-size:13px;color:var(--text2);white-space:pre-wrap;line-height:1.8;">${esc(session.package_content || '')}</div>`}
  `;
}

function parseSavedContent(text) {
  if (!text) return [];
  const tenses = [];
  const blocks = text.split(/\n\n+/);
  for (const block of blocks) {
    const lines = block.trim().split('\n');
    if (!lines[0] || !lines[0].includes('|')) continue;
    const [technical, human] = lines[0].split('|').map(s => s.trim());
    const layers = [];
    let currentLayer = null;
    for (let i = 1; i < lines.length; i++) {
      const line = lines[i];
      const layerMatch = line.match(/^\s+\[(.+)\]/);
      if (layerMatch) {
        if (currentLayer) layers.push(currentLayer);
        currentLayer = { label: layerMatch[1], sentences: [] };
      } else if (currentLayer && line.includes(' | ')) {
        const [es, en] = line.trim().split(' | ');
        if (es && en) currentLayer.sentences.push({ es, en });
      }
    }
    if (currentLayer) layers.push(currentLayer);
    if (layers.length) tenses.push({ technical, human, layers });
  }
  return tenses;
}

// ── PACKAGE GENERATION ────────────────────────────────────────────────────────

async function generatePackage() {
  if (!settings.anthropicKey) {
    setStatus('gen-status', '⚠ Add your Anthropic API key in Settings first', 'var(--red)');
    return;
  }
  const btn = document.getElementById('gen-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Generating...'; }

  const p = todayParams;
  const tenseList = [
    {technical:'Presente', human:'Now'},
    {technical:'Pretérito', human:'Done'},
    {technical:'Imperfecto', human:'Used to / Was happening'},
    {technical:'Futuro', human:'Will'},
    {technical:'Condicional', human:'Would'},
    {technical:'Subjuntivo', human:'Wishes / Hopes (+-) / Emotions'}
  ];

  const results = [];
  let coreSentence = null; // established on first tense, passed to all subsequent

  for (let i = 0; i < tenseList.length; i++) {
    const tense = tenseList[i];
    setStatus('gen-status', `Generating ${tense.technical} (${i+1}/6)...`, 'var(--accent)');
    try {
      const prompt = buildTensePrompt(p, tense, coreSentence);
      const res = await fetch(PROXY + '/anthropic/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': settings.anthropicKey, 'anthropic-version': '2023-06-01' },
        body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] })
      });
      const raw = await res.text();
      console.log('Paquetes response (' + tense.technical + '):', raw.slice(0, 300));
      let data;
      try { data = JSON.parse(raw); } catch(pe) { throw new Error('Proxy error: ' + raw.slice(0, 120)); }
      const text = data.content?.find(c => c.type === 'text')?.text?.trim() || '';
      if (!text) throw new Error(data.error?.message || JSON.stringify(data).slice(0, 120));
      const layers = parseTenseResponse(text);
      results.push({ technical: tense.technical, human: tense.human, layers });
      // Extract the core sentence from the first Yo sentence of Presente
      if (i === 0 && !coreSentence) {
        const baseLayer = layers.find(l => l.label === 'Base conjugations');
        if (baseLayer && baseLayer.sentences.length > 0) {
          coreSentence = baseLayer.sentences[0].en; // use English as the stable reference
        }
      }
    } catch(e) {
      setStatus('gen-status', 'Error on ' + tense.technical + ': ' + e.message, 'var(--red)');
      if (btn) { btn.disabled = false; btn.textContent = 'Generate package'; }
      return;
    }
  }

  todayPackage = results;
  paquetesView = 'package';
  setStatus('gen-status', '', '');
  renderPaquetes();
}

function buildTensePrompt(p, tense, coreSentence) {
  const isFirst = !coreSentence;
  const coreNote = isFirst
    ? `First, establish a CORE SENTENCE in the Yo form — a natural, complete sentence using the verb "${p.verb.es}" and weaving in the vocabulary (${p.vocabulary.join(', ')}). This core idea will be the anchor for all four layers.`
    : `The CORE SENTENCE IDEA (established in Presente) is: "${coreSentence}"
Adapt this same idea into the ${tense.technical} tense. The meaning and subject matter stay the same — only the tense and layer transformations change.`;

  return `You are a Mexico City Spanish tutor. Generate ONE tense block for a daily practice package.

LEARNER: Intermediate English speaker in Mérida, Mexico. Target: educated Mexico City Spanish (Condesa/Polanco register). Natural, not textbook stiff, not street slang.

PARAMETERS:
- Verb: ${p.verb.es} (${p.verb.en})
- Vocabulary: ${p.vocabulary.join(', ')}
- Grammar concept: ${p.grammar.label} — ${p.grammar.desc}
- Pronoun focus: ${p.pronoun}
- Mexican expression: ${p.mexican.label} (${p.mexican.desc})

TENSE: ${tense.technical} (${tense.human})

${coreNote}

Generate exactly FOUR layers. Each layer transforms the SAME core sentence idea — do not introduce new subject matter:

LAYER: Base conjugations
The core sentence idea in ${tense.technical}, one per pronoun: Yo, Tú, Él/Ella, Nosotros, Ellos/Ellas. Same idea, same vocabulary, conjugated for each person.

LAYER: Object pronouns
2 sentences — take the core idea and restructure it to use the pronoun focus (${p.pronoun}) naturally. Same core meaning.

LAYER: Grammar concept
2 sentences — apply ${p.grammar.label} to the core idea. Same underlying meaning, now shaped by the grammar concept.

LAYER: Mexican layer
2 sentences — express the core idea using ${p.mexican.label}. Natural, conversational Mexican Spanish. Same idea, Mexican flavor.

FORMAT — each sentence on its own line with English translation after " | ":
Sentence in Spanish. | English translation.

Start directly with LAYER: — no preamble.`;
}

function parseTenseResponse(text) {
  const layers = [];
  let currentLayer = null;
  for (const line of text.split('\n')) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    if (trimmed.startsWith('LAYER:')) {
      if (currentLayer) layers.push(currentLayer);
      currentLayer = { label: trimmed.replace('LAYER:', '').trim(), sentences: [] };
    } else if (currentLayer && trimmed.includes(' | ')) {
      const parts = trimmed.split(' | ');
      const es = parts[0].trim();
      const en = parts.slice(1).join(' | ').trim();
      if (es && en) currentLayer.sentences.push({ es, en });
    }
  }
  if (currentLayer) layers.push(currentLayer);
  return layers;
}
